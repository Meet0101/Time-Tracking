{% load django_bootstrap5 %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot password | TimeTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Outfit', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .reset-card { background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 3rem; max-width: 450px; width: 100%; }
        .btn-primary { background: #6366f1; border: none; border-radius: 1rem; padding: 0.8rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="reset-card text-center">
        <h3 class="fw-bold mb-3">Reset Password</h3>
        <p class="text-muted mb-4">Enter your email and we'll send you instructions.</p>
        <form method="post">
            {% csrf_token %}
            {% bootstrap_form form %}
            <button type="submit" class="btn btn-primary w-100 mt-3">Send Reset Link</button>
        </form>
        <div class="mt-4">
            <a href="{% url 'login' %}" class="text-muted small">Back to Login</a>
        </div>
    </div>
</body>
</html>
